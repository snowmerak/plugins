version: '3'

tasks:
  test:
    desc: "Run all unit tests across Go, Rust, Python, and TypeScript"
    cmds:
      - task: go:test
      - task: rust:test
      - task: py:test
      - task: ts:test

  go:test:
    desc: "Run Go package unit tests"
    cmds:
      - go test -v ./go/ringbuf

  rust:build:
    desc: "Build Rust workspace"
    cmds:
      - cargo build --manifest-path rust/Cargo.toml

  rust:test:
    desc: "Run Rust workspace unit tests"
    cmds:
      - cargo test --manifest-path rust/Cargo.toml

  py:test:
    desc: "Run Python package unit tests"
    dir: python/ringbuf_py
    cmds:
      - uv run pytest

  ts:build:
    desc: "Build TypeScript library"
    dir: typescript/ringbuf-ts
    cmds:
      - npm run build

  ts:test:
    desc: "Run TypeScript package unit tests"
    dir: typescript/ringbuf-ts
    cmds:
      - task: ts:build
      - npm test

  demo:host-go:
    desc: "Run Go Demo Host"
    cmds:
      - go run go/ringbuf-go-demo/main.go --role Host --path temp_shm

  demo:plugin-rust:
    desc: "Run Rust Demo Plugin"
    cmds:
      - cargo run --manifest-path rust/Cargo.toml --bin ringbuf-rust -- --role Plugin --path temp_shm

  demo:host-py:
    desc: "Run Python Demo Host"
    dir: python/ringbuf_py
    cmds:
      - uv run --no-sync python -m ringbuf_py_demo.main --role Host --path temp_shm

  demo:plugin-py:
    desc: "Run Python Demo Plugin"
    dir: python/ringbuf_py
    cmds:
      - uv run --no-sync python -m ringbuf_py_demo.main --role Plugin --path temp_shm

  demo:host-ts:
    desc: "Run TypeScript Demo Host"
    dir: typescript/ringbuf-ts-demo
    cmds:
      - npm run start -- --role Host --path temp_shm

  demo:plugin-ts:
    desc: "Run TypeScript Demo Plugin"
    dir: typescript/ringbuf-ts-demo
    cmds:
      - npm run start -- --role Plugin --path temp_shm
